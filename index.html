<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炫酷霓虹贪吃蛇 - Cool Snake</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 引入谷歌字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1 class="neon-text">NEON SNAKE</h1>
            <div class="score-board">
                <div class="score-item">得分: <span id="current-score">0</span></div>
                <div class="score-item">最高分: <span id="high-score">0</span></div>
            </div>
            <div class="speed-board">
                <div class="speed-item">当前倍率: <span id="speed-multiplier">1.0</span>x</div>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
            <div id="overlay" class="overlay">
                <div id="start-screen">
                    <button id="start-btn" class="neon-btn">开始游戏</button>
                    <p class="hint">使用方向键或 WASD 控制</p>
                    <div class="speed-control-container">
                        <label for="speed-slider" class="speed-label">初始速度调节</label>
                        <input type="range" id="speed-slider" min="1" max="10" value="5" class="neon-slider">
                    </div>
                </div>
                <div id="pause-screen" class="hidden">
                    <h2 class="neon-text">已暂停</h2>
                    <button id="resume-btn" class="neon-btn">继续游戏</button>
                </div>
                <div id="game-over-screen" class="hidden">
                    <h2 class="neon-text color-red">游戏结束</h2>
                    <p>最终得分: <span id="final-score">0</span></p>
                    <button id="restart-btn" class="neon-btn">重新开始</button>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="pause-btn" class="neon-btn small">暂停</button>
            <div class="ingame-speed-control">
                <label for="ingame-speed-slider">速度:</label>
                <input type="range" id="ingame-speed-slider" min="1" max="10" value="5" class="neon-slider small">
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
