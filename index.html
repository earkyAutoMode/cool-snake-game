<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake - Cool Edition</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --bg-dark: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .game-container {
            position: relative;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), 0 0 10px var(--neon-blue);
            border: 1px solid rgba(0, 255, 255, 0.2);
            text-align: center;
        }

        canvas#game-canvas {
            background-color: #000;
            display: block;
            margin: 10px auto;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            border-radius: 5px;
        }

        .ui-panel {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .score-box {
            color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green);
        }

        .highscore-box {
            color: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink);
        }

        .controls {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        button {
            background: transparent;
            color: white;
            border: 2px solid var(--neon-blue);
            padding: 8px 20px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            outline: none;
        }

        button:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        button:active {
            transform: scale(0.95);
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            z-index: 10;
            display: none;
        }

        #overlay h2 {
            font-size: 3rem;
            color: var(--neon-pink);
            text-shadow: 0 0 20px var(--neon-pink);
            margin-bottom: 20px;
        }

        .instructions {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #888;
        }

        /* Responsive */
        @media (max-width: 500px) {
            canvas#game-canvas {
                width: 300px;
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="game-container">
        <div class="ui-panel">
            <div class="score-box">Score: <span id="score">0</span></div>
            <div class="highscore-box">High: <span id="highscore">0</span></div>
        </div>

        <canvas id="game-canvas" width="400" height="400"></canvas>

        <div class="controls">
            <button id="start-btn">Start Game</button>
            <button id="pause-btn">Pause</button>
        </div>

        <div class="instructions">
            Use ARROW KEYS or WASD to Move
        </div>

        <div id="overlay">
            <h2 id="overlay-title">GAME OVER</h2>
            <button id="restart-btn">Try Again</button>
        </div>
    </div>

    <script>
        // --- Background Particles ---
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let particles = [];

        function resizeBg() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeBg);
        resizeBg();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * bgCanvas.width;
                this.y = Math.random() * bgCanvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.color = Math.random() > 0.5 ? '#00ffff' : '#ff00ff';
                this.alpha = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > bgCanvas.width || this.y < 0 || this.y > bgCanvas.height) {
                    this.reset();
                }
            }
            draw() {
                bgCtx.globalAlpha = this.alpha;
                bgCtx.fillStyle = this.color;
                bgCtx.beginPath();
                bgCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                bgCtx.fill();
            }
        }

        for (let i = 0; i < 50; i++) particles.push(new Particle());

        function animateBg() {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateBg);
        }
        animateBg();

        // --- Game Logic ---
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highscoreEl = document.getElementById('highscore');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const restartBtn = document.getElementById('restart-btn');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');

        const GRID_SIZE = 20;
        const TILE_COUNT = canvas.width / GRID_SIZE;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 0;
        let dy = 0;
        let nextDx = 0;
        let nextDy = 0;
        let score = 0;
        let highscore = localStorage.getItem('snake-highscore') || 0;
        let gameLoop = null;
        let isPaused = false;
        let isRunning = false;

        highscoreEl.innerText = highscore;

        function initGame() {
            snake = [{ x: 10, y: 10 }, { x: 10, y: 11 }, { x: 10, y: 12 }];
            score = 0;
            scoreEl.innerText = score;
            nextDx = 0;
            nextDy = -1; // Start moving up
            dx = 0;
            dy = -1;
            placeFood();
            overlay.style.display = 'none';
            isRunning = true;
            isPaused = false;
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(draw, 100);
        }

        function placeFood() {
            food = {
                x: Math.floor(Math.random() * TILE_COUNT),
                y: Math.floor(Math.random() * TILE_COUNT)
            };
            // Ensure food doesn't land on snake
            if (snake.some(segment => segment.x === food.x && segment.y === food.y)) {
                placeFood();
            }
        }

        function draw() {
            if (isPaused) return;

            // Update directions
            dx = nextDx;
            dy = nextDy;

            // Move snake
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Collision Check
            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT ||
                snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Eat Food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.innerText = score;
                if (score > highscore) {
                    highscore = score;
                    highscoreEl.innerText = highscore;
                    localStorage.setItem('snake-highscore', highscore);
                }
                placeFood();
            } else {
                snake.pop();
            }

            // Render
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Food
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff00ff';
            ctx.fillStyle = '#ff00ff';
            ctx.fillRect(food.x * GRID_SIZE + 2, food.y * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4);

            // Draw Snake
            snake.forEach((segment, index) => {
                const isHead = index === 0;
                ctx.shadowBlur = isHead ? 20 : 10;
                ctx.shadowColor = '#39ff14';
                ctx.fillStyle = isHead ? '#39ff14' : 'rgba(57, 255, 20, 0.8)';
                ctx.fillRect(segment.x * GRID_SIZE + 1, segment.y * GRID_SIZE + 1, GRID_SIZE - 2, GRID_SIZE - 2);
            });
            ctx.shadowBlur = 0;
        }

        function gameOver() {
            isRunning = false;
            clearInterval(gameLoop);
            overlayTitle.innerText = "GAME OVER";
            overlay.style.display = 'flex';
        }

        function togglePause() {
            if (!isRunning) return;
            isPaused = !isPaused;
            pauseBtn.innerText = isPaused ? "Resume" : "Pause";
            if (isPaused) {
                overlayTitle.innerText = "PAUSED";
                overlay.style.display = 'flex';
                restartBtn.style.display = 'none';
            } else {
                overlay.style.display = 'none';
                restartBtn.style.display = 'block';
            }
        }

        window.addEventListener('keydown', e => {
            const key = e.key;
            if ((key === 'ArrowUp' || key === 'w' || key === 'W') && dy !== 1) { nextDx = 0; nextDy = -1; }
            else if ((key === 'ArrowDown' || key === 's' || key === 'S') && dy !== -1) { nextDx = 0; nextDy = 1; }
            else if ((key === 'ArrowLeft' || key === 'a' || key === 'A') && dx !== 1) { nextDx = -1; nextDy = 0; }
            else if ((key === 'ArrowRight' || key === 'd' || key === 'D') && dx !== -1) { nextDx = 1; nextDy = 0; }
            else if (key === ' ') togglePause();
        });

        startBtn.addEventListener('click', () => {
            initGame();
            startBtn.style.display = 'none';
        });
        pauseBtn.addEventListener('click', togglePause);
        restartBtn.addEventListener('click', initGame);

    </script>
</body>
</html>
