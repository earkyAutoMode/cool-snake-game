<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>霓虹贪吃蛇 - Neon Snake</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>NEON SNAKE</h1>
            <div class="score-board">
                <div class="score-item">SCORE: <span id="current-score">0</span></div>
                <div class="score-item">HIGH SCORE: <span id="high-score">0</span></div>
            </div>
        </header>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
            <div id="game-over" class="overlay hidden">
                <h2>GAME OVER</h2>
                <button id="restart-btn">RESTART</button>
            </div>
            <div id="start-screen" class="overlay">
                <h2>READY?</h2>
                <button id="start-btn">START GAME</button>
                <p class="hint">Use Arrow Keys or Buttons</p>
            </div>
        </div>

        <div class="controls">
            <div class="control-row">
                <button class="ctrl-btn" id="ctrl-up">▲</button>
            </div>
            <div class="control-row">
                <button class="ctrl-btn" id="ctrl-left">◀</button>
                <button class="ctrl-btn" id="ctrl-down">▼</button>
                <button class="ctrl-btn" id="ctrl-right">▶</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
